name: Docs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock
      - name: Create venv
        run: uv venv --python 3.12
      - name: Install from uv.lock (docs extras)
        run: uv sync --locked --extra docs
      - name: Build site (strict)
        run: uv run mkdocs build --strict
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: deploy to GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.retry1.outputs.page_url || steps.retry2.outputs.page_url }}
    steps:
      # The Pages API intermittently rejects deployments with a transient
      # "Deployment failed, try again later" — retry twice with backoff.
      - name: Deploy
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - name: Deploy (retry 1)
        id: retry1
        if: steps.deployment.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Wait before second retry
        if: steps.deployment.outcome == 'failure' && steps.retry1.outcome == 'failure'
        run: sleep 60
      - name: Deploy (retry 2)
        id: retry2
        if: steps.deployment.outcome == 'failure' && steps.retry1.outcome == 'failure'
        uses: actions/deploy-pages@v4
